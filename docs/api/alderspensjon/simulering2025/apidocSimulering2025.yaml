    AlderspensjonFraFolketrygdenResultV3:
      type: object
      properties:
        datoFom:
          type: string
        delytelser:
          type: array
          items:
            $ref: '#/components/schemas/DelytelseResultV3'
        uttaksgrad:
          type: integer
          format: int32
    AlderspensjonResultV3:
      type: object
      properties:
        pensjonsperioder:
          type: array
          items:
            $ref: '#/components/schemas/PensjonsperiodeResultV3'
        simuleringsdataListe:
          type: array
          items:
            $ref: '#/components/schemas/SimuleringsdataResultV3'
        pensjonsbeholdningsperioder:
          type: array
          items:
            $ref: '#/components/schemas/PensjonsbeholdningPeriodeResultV3'
        alderspensjonFraFolketrygden:
          type: array
          items:
            $ref: '#/components/schemas/AlderspensjonFraFolketrygdenResultV3'
        harUttak:
          type: boolean
        harTidligereUttak:
          type: boolean
        afpPrivatBeholdningVedUttak:
          type: integer
          format: int32
          description: |
            AFP-beholdningen ved uttakstidspunktet, brukt som grunnlag for den livsvarige delen av AFP Privat.

            Feltet ble opprinnelig lagt til slik at TP-ordninger (bl.a. KLP) skulle kunne beregne simulert
            AFP Offentlig livsvarig, før NAV hadde en egen tjeneste for det. Nå som en slik tjeneste
            finnes, har feltet begrenset verdi og kan på sikt fases ut.

            \

            AFP Privat består av flere komponenter:

            * **Livsvarig del:** Utgjør 0,314% av pensjonsgrunnlaget, levealdersjustert med forholdstall.
            * **Kronetillegg:** 1 600 kr/mnd frem til måneden du fyller 67 år.
            * **Kompensasjonstillegg:** Livsvarig, skattefritt tillegg til deg født 1944–1962. Størrelse avhenger av fødselsår, maks 50% av livsvarig del.

            Eksempel: En beholdning på 121 871 kr med forholdstall 1,012 (68 år og 5 mnd, 1958-kullet) gir
            121 871 / 1,012 ≈ 120 426 kr/år i livsvarig del, dvs. ~10 036 kr/mnd.

            For en person som allerede har startet uttak av AFP Privat, returnerer feltet 0.
        sisteGyldigeOpptjeningsAr:
          type: integer
          format: int32
      required:
        - harTidligereUttak
        - harUttak
    DelytelseResultV3:
      type: object
      properties:
        pensjonstype:
          type: string
        belop:
          type: integer
          format: int32
    GarantipensjonsnivaaResultV3:
      type: object
      properties:
        belop:
          type: number
          format: double
        satsType:
          type: string
        sats:
          type: number
          format: double
        tt_anv:
          type: integer
          format: int32
    PensjonsbeholdningPeriodeResultV3:
      type: object
      properties:
        pensjonsbeholdning:
          type: number
          format: double
        garantipensjonsbeholdning:
          type: number
          format: double
        garantitilleggsbeholdning:
          type: number
          format: double
        datoFom:
          type: string
        garantipensjonsniva:
          $ref: '#/components/schemas/GarantipensjonsnivaaResultV3'
    PensjonsperiodeResultV3:
      type: object
      description: |
        En periode med alderspensjon, som kan være et resultat av eksisterende løpende uttak, eller et nytt uttak simulert fra den oppgitte datoen for første uttak.

        For personer født før 1963, som kan ha løpende uttak uten datoTom, vil det siste elementet i `pensjonsperioder` typisk representere den løpende utbetalingen uten `datoFom`, mens øvrige elementer viser årsbeløp beregnet ut fra kombinasjonen av uttaksgrader i de aktuelle periodene.
      properties:
        arligUtbetaling:
          type: integer
          format: int32
        datoFom:
          description: Startdato for perioden, i formatet "YYYY-MM-DD". For løpende uttak er det ikke noen datoTom \
            
            (den vil mangle, være NULL eller i visse tilfeller -999999999-01-01, litt avh av klient-implementasjon).
          type: string
    SimuleringsdataResultV3:
      type: object
      properties:
        poengArTom1991:
          type: integer
          format: int32
        poengArFom1992:
          type: integer
          format: int32
        sluttpoengtall:
          type: number
          format: double
        anvendtTrygdetid:
          type: integer
          format: int32
        basisgp:
          type: number
          format: double
        basistp:
          type: number
          format: double
        basispt:
          type: number
          format: double
        forholdstallUttak:
          type: number
          format: double
        delingstallUttak:
          type: number
          format: double
        uforegradVedOmregning:
          type: integer
          format: int32
        datoFom:
          type: string
    AlderspensjonOgPrivatAfpSpecV2:
      type: object
      description: Spesifikasjon for simulering av alderspensjon og privat AFP.
      properties:
        personident:
          type: string
          description: >-
            Fødselsnummer eller D-nummer (11 siffer) for personen det simuleres for.
          example: "01234567890"
        sivilstatusVedPensjonering:
          type: string
          description: >-
            Sivilstatus ved pensjonering. Påvirker beregning av grunnpensjon
            (sats 85 % av G ved GIFT/SAMB/REPA med EPS som har pensjon eller
            inntekt over 2G, ellers 100 % av G) og rett til gjenlevendetillegg.\

            \

            Gyldige verdier:\

            – `ENKE` – Enke/enkemann\

            – `GIFT` – Gift\

            – `GJES` – Gjenlevende etter separasjon\

            – `GJPA` – Gjenlevende registrert partner\

            – `GJSA` – Gjenlevende samboer\

            – `GLAD` – Gift, lever adskilt\

            – `NULL` – Ukjent/ikke oppgitt\

            – `PLAD` – Registrert partner, lever adskilt\

            – `REPA` – Registrert partner\

            – `SAMB` – Samboer\

            – `SEPA` – Separert partner\

            – `SEPR` – Separert\

            – `SKIL` – Skilt\

            – `SKPA` – Skilt partner\

            – `UGIF` – Ugift
          enum:
            - ENKE
            - GIFT
            - GJES
            - GJPA
            - GJSA
            - GLAD
            - 'NULL'
            - PLAD
            - REPA
            - SAMB
            - SEPA
            - SEPR
            - SKIL
            - SKPA
            - UGIF
        foersteUttak:
          $ref: '#/components/schemas/ApOgPrivatAfpUttakSpecV2'
          description: >-
            Første uttaksperiode. Kan være gradert (20–80 %) eller helt uttak (100 %).
            Hvis `heltUttak` ikke er oppgitt, tolkes dette som eneste og fulle uttaksperiode.
        heltUttak:
          $ref: '#/components/schemas/ApOgPrivatAfpUttakSpecV2'
          description: >-
            Uttaksperiode for 100 % uttak. Oppgis kun ved gradert uttak i `foersteUttak`.
            `fomDato` må være etter `foersteUttak.fomDato`.
        aarligInntektFoerUttak:
          type: integer
          format: int32
          description: >-
            Forventet årlig pensjonsgivende inntekt (kr) frem til første uttaksdato.
            Brukes til fremtidig pensjonsopptjening. Standard: 0.
          example: 600000
        antallInntektsaarEtterHeltUttak:
          type: integer
          format: int32
          description: >-
            Antall år med pensjonsgivende inntekt etter 100 % uttak. Brukes hvis
            personen forventer å jobbe videre etter heltuttak.
          example: 2
        aarIUtlandetEtter16:
          type: integer
          format: int32
          description: >-
            Antall år bosatt utenfor Norge etter fylte 16 år.
            Reduserer trygdetiden tilsvarende, noe som kan påvirke grunnpensjon og garantipensjon.
          example: 0
        harEpsPensjon:
          type: boolean
          description: >-
            Om ektefelle/partner/samboer (EPS) mottar pensjon.
            Påvirker beregning av grunnpensjon (sats 85 % av G hvis EPS har pensjon).
          example: false
        harEpsPensjonsgivendeInntektOver2G:
          type: boolean
          description: >-
            Om EPS har pensjonsgivende inntekt over 2 ganger grunnbeløpet (2G).
            Påvirker beregning av grunnpensjon på samme måte som `harEpsPensjon`.
          example: true
        simulerPrivatAfp:
          type: boolean
          description: >-
            Hvorvidt privat AFP skal inkluderes i simuleringen.\

            – `true`: beregner alderspensjon kombinert med privat AFP (simuleringstype `ALDER_M_AFP_PRIVAT`).\

            – `false` eller utelatt: beregner kun alderspensjon (simuleringstype `ALDER`).
          example: true
      required:
        - foersteUttak
        - personident
        - sivilstatusVedPensjonering
    ApOgPrivatAfpUttakSpecV2:
      type: object
      description: Uttaksperiode med startdato, uttaksgrad og eventuell inntekt i perioden.
      properties:
        fomDato:
          type: string
          format: date
          description: >-
            Startdato for uttaksperioden, i formatet `YYYY-MM-DD` (ISO 8601, tidssone CET).
            Kan ikke være i fortiden. Ved gradert uttak må `foersteUttak.fomDato` være
            før `heltUttak.fomDato`.
          example: "2027-03-01"
        grad:
          type: integer
          format: int32
          description: >-
            Uttaksgrad i prosent. Gyldige verdier: 20, 40, 50, 60, 80, 100.
            Andre verdier gir HTTP 400 med feilkode `UGYLDIG_UTTAKSGRAD`.
          enum:
            - 20
            - 40
            - 50
            - 60
            - 80
            - 100
          example: 50
        aarligInntekt:
          type: integer
          format: int32
          description: >-
            Forventet årlig pensjonsgivende inntekt (kr) i denne uttaksperioden.
            Ved gradert uttak: inntekt i den graderte fasen.
            Ved heltuttak (`grad: 100`): inntekt etter 100 % uttak starter.
          example: 400000
      required:
        - fomDato
        - grad
    AlderspensjonOgPrivatAfpResultV2:
      type: object
      description: Resultat av simulering av alderspensjon og privat AFP.
      properties:
        suksess:
          type: boolean
          description: >-
            Angir om simuleringen ble gjennomført uten feil.
            `false` betyr at `problem`-feltet er utfylt med årsak.
            Merk: `UTILSTREKKELIG_OPPTJENING` og `UTILSTREKKELIG_TRYGDETID`
            returneres med HTTP 200 og `suksess: false`.
        alderspensjonsperioder:
          type: array
          description: >-
            Liste over alderspensjonsperioder, én per alder fra første uttaksalder.
            Hvert element representerer én årgang med beregnet pensjonsbeløp og uttaksgrad-perioder.
          items:
            $ref: '#/components/schemas/ApOgPrivatAfpAlderspensjonsperiodeResultV2'
        privatAfpPerioder:
          type: array
          description: >-
            Liste over perioder med beregnet privat AFP, én per alder fra første uttaksalder.
            Tom liste hvis `simulerPrivatAfp` er `false` eller utelatt, eller personen
            ikke kvalifiserer for privat AFP.
          items:
            $ref: '#/components/schemas/ApOgPrivatAfpPrivatAfpPeriodeResultV2'
        harNaavaerendeUttak:
          type: boolean
          description: >-
            Om personen allerede har løpende alderspensjonuttak på simuleringstidspunktet.
        harTidligereUttak:
          type: boolean
          description: >-
            Om personen har hatt alderspensjonuttak tidligere (f.eks. opphørt gradert uttak).
        harLoependePrivatAfp:
          type: boolean
          description: >-
            Om personen allerede har løpende privat AFP på simuleringstidspunktet.
        problem:
          $ref: '#/components/schemas/ApOgPrivatAfpProblemV2'
          description: >-
            Feildetaljer ved `suksess: false`. `null` ved vellykket simulering.
      required:
        - alderspensjonsperioder
        - harLoependePrivatAfp
        - harNaavaerendeUttak
        - harTidligereUttak
        - privatAfpPerioder
        - suksess
    ApOgPrivatAfpAlderspensjonsperiodeResultV2:
      type: object
      description: Alderspensjonsperiode for én bestemt alder.
      properties:
        alder:
          type: integer
          format: int32
          description: >-
            Personens alder (hele år) ved starten av denne pensjonsperioden.
        beloep:
          type: integer
          format: int32
          description: >-
            Beregnet årlig alderspensjon (kr) i denne perioden.
        datoFom:
          type: string
          format: date
          description: >-
            Startdato for perioden (`YYYY-MM-DD`). Første dag i måneden etter
            personens bursdag ved aktuell alder.
        uttaksperiode:
          type: array
          description: >-
            Uttaksgrad-perioder innenfor denne aldersperioden. Viser når og med
            hvilken grad uttaket startet. Kan ha flere elementer ved gradsskifte.
          items:
            $ref: '#/components/schemas/ApOgPrivatAfpUttaksperiodeResultV2'
      required:
        - alder
        - beloep
        - datoFom
        - uttaksperiode
    ApOgPrivatAfpPrivatAfpPeriodeResultV2:
      type: object
      description: >-
        Privat AFP-periode for én bestemt alder.
        Privat AFP består av en livsvarig del, kronetillegg og kompensasjonstillegg.
        Kun det samlede årlige beløpet eksponeres i dette APIet.
      properties:
        alder:
          type: integer
          format: int32
          description: Personens alder (hele år) i denne AFP-perioden.
        beloep:
          type: integer
          format: int32
          description: >-
            Beregnet årlig privat AFP (kr). Summen av livsvarig del,
            kronetillegg og kompensasjonstillegg.
      required:
        - alder
        - beloep
    ApOgPrivatAfpUttaksperiodeResultV2:
      type: object
      description: En periode med en bestemt uttaksgrad innenfor en alderspensjonsperiode.
      properties:
        startmaaned:
          type: integer
          format: int32
          description: >-
            Månedsnummer (1–12) for når denne uttaksgraden startet.
        uttaksgrad:
          type: integer
          format: int32
          description: >-
            Uttaksgrad i prosent for denne perioden.
            Gyldige verdier: 0, 20, 40, 50, 60, 80, 100.
      required:
        - startmaaned
        - uttaksgrad
    ApOgPrivatAfpProblemV2:
      type: object
      description: Feildetaljer ved mislykket simulering.
      properties:
        kode:
          type: string
          description: >-
            Feilkode som identifiserer årsaken til feilen.\

            \

            Feilkoder og tilhørende HTTP-statuser:\

            – `UGYLDIG_UTTAKSDATO` (400): ugyldig uttaksdato\

            – `UGYLDIG_UTTAKSGRAD` (400): ugyldig uttaksgrad\

            – `UGYLDIG_SIVILSTATUS` (400): ugyldig sivilstatuskode\

            – `UGYLDIG_INNTEKT` (400): ugyldig inntekt\

            – `UGYLDIG_ANTALL_AAR` (400): ugyldig antall år\

            – `UGYLDIG_PERSONIDENT` (400): ugyldig fødselsnummer/D-nummer\

            – `PERSON_IKKE_FUNNET` (404): personen ble ikke funnet\

            – `PERSON_FOR_HOEY_ALDER` (400): personen er for gammel for simulering\

            – `UTILSTREKKELIG_OPPTJENING` (200): for lav pensjonsopptjening\

            – `UTILSTREKKELIG_TRYGDETID` (200): for kort trygdetid\

            – `ANNEN_KLIENTFEIL` (400): annen klientfeil\

            – `SERVERFEIL` (500): intern feil i simulatoren
          enum:
            - UGYLDIG_UTTAKSDATO
            - UGYLDIG_UTTAKSGRAD
            - UGYLDIG_SIVILSTATUS
            - UGYLDIG_INNTEKT
            - UGYLDIG_ANTALL_AAR
            - UGYLDIG_PERSONIDENT
            - PERSON_IKKE_FUNNET
            - PERSON_FOR_HOEY_ALDER
            - UTILSTREKKELIG_OPPTJENING
            - UTILSTREKKELIG_TRYGDETID
            - ANNEN_KLIENTFEIL
            - SERVERFEIL
        beskrivelse:
          type: string
          description: Menneskelig lesbar beskrivelse av feilen.
      required:
        - beskrivelse
        - kode
    TidligstMuligUttakSpecV1:
      type: object
      properties:
        personId:
          type: string
        fodselsdato:
          type: string
          format: date
        uttaksgrad:
          type: integer
          format: int32
        heltUttakFraOgMedDato:
          type: string
          format: date
        rettTilAfpOffentligDato:
          description: |
