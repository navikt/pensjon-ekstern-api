openapi: 3.1.0
info:
  title: Pensjonssimulator API
  description: >-
    Tjenester for simulering av pensjon.\

    Klienter må autentisere seg via Maskinporten – se hver enkelt tjeneste for
    hvilket *scope* som skal brukes.\
    
    I testmiljøet ("dev") må det benyttes syntetiske personer fra Test-Norge.
  version: v1.2.1
servers:
  - url: https://pensjon-gw.ekstern.dev.nav.no
  - url: https://pensjon-gw.nav.no
paths:
  /pensjonssimulator/v4/simuler-alderspensjon:
    post:
      tags:
        - Alderspensjon V4
      summary: Simuler alderspensjon for personer født i 1963 eller senere.
      description: >-
        Lager en prognose for utbetaling av alderspensjon for personer født i
        1963 eller senere.\
        
        Dette er en tjeneste for offentlige tjenestepensjonsordninger.\
        
        Personen må være medlem av tjenestepensjonsordningen.\

        \

        *Scope*:\

        – Uten delegering: **nav:pensjonssimulator:simulering**\

        – Med delegering: **nav:pensjon/simulering.read**
      operationId: simulerAlderspensjon
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlderspensjonSpecV4'
            example:
              personId: "02016512345"
              gradertUttak:
                fraOgMedDato: "2027-03-01"
                uttaksgrad: 50
              heltUttakFraOgMedDato: "2032-03-01"
              aarIUtlandetEtter16: 0
              epsPensjon: false
              eps2G: false
              fremtidigInntektListe:
                - aarligInntekt: 600000
                  fraOgMedDato: "2025-01-01"
                - aarligInntekt: 0
                  fraOgMedDato: "2032-03-01"
        required: true
      responses:
        '200':
          description: >-
            Simulering av alderspensjon utført. `simuleringSuksess` er `true`
            dersom simuleringen var vellykket, og `false` dersom personen ikke
            hadde tilstrekkelig opptjening eller trygdetid, eller det oppstod
            en annen kjent feil i simuleringen – se `aarsakListeIkkeSuksess`
            for detaljer.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AlderspensjonResultV4'
              examples:
                gradertOgHeltUttak:
                  summary: Vellykket simulering med gradert uttak fra 2027 og helt uttak fra 2032
                  value:
                    simuleringSuksess: true
                    aarsakListeIkkeSuksess: []
                    harUttak: false
                    alderspensjon:
                      - fraOgMedDato: "2027-03-01"
                        uttaksgrad: 50
                        delytelseListe:
                          - pensjonsType: "inntektsPensjon"
                            belop: 145000
                          - pensjonsType: "garantiPensjon"
                            belop: 23000
                      - fraOgMedDato: "2032-03-01"
                        uttaksgrad: 100
                        delytelseListe:
                          - pensjonsType: "inntektsPensjon"
                            belop: 290000
                    forslagVedForLavOpptjening: null
                forLavOpptjening:
                  summary: Simulering avslått pga. for lav opptjening, med forslag til alternativt uttakstidspunkt
                  value:
                    simuleringSuksess: false
                    aarsakListeIkkeSuksess:
                      - statusKode: "AVSLAG_FOR_LAV_OPPTJENING"
                        statusBeskrivelse: "UtilstrekkeligOpptjeningException"
                    harUttak: false
                    alderspensjon: []
                    forslagVedForLavOpptjening:
                      gradertUttak:
                        fraOgMedDato: "2028-03-01"
                        uttaksgrad: 50
                      heltUttakFraOgMedDato: "2032-03-01"
        '400':
          description: >-
            Forespørselen mangler obligatoriske felt (f.eks. `personId` eller
            `heltUttakFraOgMedDato`), eller inneholder et ugyldig datoformat
            (forventet format: YYYY-MM-DD). `statusKode` i responsen vil
            være `ANNET` for denne feilsituasjonen.\

            \

            Merk: De fleste simuleringsfeil returneres som HTTP 200 med
            `simuleringSuksess: false`. Mulige `statusKode`-verdier på tvers
            av alle responser:\

            – `AVSLAG_FOR_LAV_OPPTJENING`: Utilstrekkelig pensjonsopptjening
            for valgt uttakstidspunkt.\

            – `AVSLAG_FOR_KORT_TRYGDETID`: Utilstrekkelig trygdetid for valgt
            uttakstidspunkt.\

            – `BRUKER_FODT_FOR_1943`: Personen er født før 1943 og støttes
            ikke.\

            – `BRUKER_HAR_IKKE_LOPENDE_ALDERSPENSJON`: Endring av løpende
            uttak ble forsøkt, men personen har ikke løpende alderspensjon.\

            – `BRUKER_HAR_LOPENDE_ALDERSPPENSJON_PAA_GAMMELT_REGELVERK`:
            Personen har alderspensjon på gammelt regelverk (pre-2011).\

            – `UGYLDIG_ENDRING_AV_UTTAKSGRAD`: Ugyldig endring av uttaksgrad
            for person med løpende alderspensjon.\

            – `ANNET`: Annen uklassifisert feil, inkludert manglende
            obligatoriske felt og ugyldig datoformat.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AlderspensjonResultV4'
              example:
                simuleringSuksess: false
                aarsakListeIkkeSuksess:
                  - statusKode: "ANNET"
                    statusBeskrivelse: "BadRequestException"
                harUttak: false
                alderspensjon: []
                forslagVedForLavOpptjening: null
        '500':
          description: >-
            Intern serverfeil. Simuleringen kunne ikke gjennomføres pga.
            en uventet feil.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AlderspensjonResultV4'
              example:
                simuleringSuksess: false
                aarsakListeIkkeSuksess:
                  - statusKode: "ANNET"
                    statusBeskrivelse: "RuntimeException"
                harUttak: false
                alderspensjon: []
                forslagVedForLavOpptjening: null
      security:
        - BearerAuthentication: []
  /simuler/alderspensjon/v3:
    post:
      tags:
        - Alderspensjon V3
      summary: Simuler alderspensjon for personer født før 1963.
      description: >-
        Lager en prognose for utbetaling av alderspensjon for personer født før 1963.\

        Dette er en tjeneste for offentlige tjenestepensjonsordninger.\

        Personen må være medlem av tjenestepensjonsordningen.\
        
        \

        **Endring av løpende uttak**:\
        
        Dersom personen allerede har løpende alderspensjon, vil tjenesten simulere en
        *endring* av uttaket – for eksempel endring av uttaksgrad. Det simuleres da
        et nytt uttak fra den oppgitte datoen, og pensjonsperiodene i responsen vil
        reflektere kombinasjonen av eksisterende uttak frem til endringsdatoen og
        nytt uttak fra og med endringsdatoen. Det siste elementet i `pensjonsperioder`
        vil typisk representere den løpende utbetalingen uten ny `datoFom`, mens øvrige
        elementer viser årsbeløp beregnet ut fra kombinasjonen av uttaksgrader i de
        aktuelle periodene.\

        \

        *Scope*: **nav:pensjon/v3/alderspensjon**
      operationId: simulerAlderspensjonV3
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlderspensjonSpecV3'
        required: true
      responses:
        '200':
          description: Simulering av alderspensjon utført.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AlderspensjonResultV3'
        '400':
          description: >-
            Simulering kunne ikke utføres pga. uakseptable inndata. Det kan
            være:\

            (1) UtilstrekkeligOpptjeningException (for lav opptjening) \
            
            (2) UtilstrekkeligTrygdetidException (for kort trygdetid) \
            
            (3) PersonForGammelException (født før 1943) \
            
            (4) PersonForUngException (for ung for en gitt ytelse) \
            
            (5) Pre2025OffentligAfpAvslaattException (offentlig AFP avslått, gjelder gammel AFP-ordning) \
            
            (6) DateTimeParseException (feil i datoformat i inndata til API-kallet) \
            
            (7) InvalidEnumValueException (feil i enum-verdi i inndata til API-kallet) \
            
            (8) BadSpecException (annen feil i inndata til API-kallet) \
            
            (9) BadRequestException (annen klientfeil ved API-kallet) \
            
            (10) InvalidArgumentException (argumentfeil i simuleringsprosessen) \
            
            (11) FeilISimuleringsgrunnlagetException (feil ved grunnlagsdata fra simulatoren til regelmotoren i Nav) \
            
            (12) KonsistensenIGrunnlagetErFeilException (ikke-konsistente data fra simulatoren til regelmotoren i Nav) \
            
            (13) RegelmotorValideringException (ugyldige data fra simulatoren til regelmotoren i Nav) \
            
            (14) KanIkkeBeregnesException (Navs regelmotor kan ikke beregne)
        '401':
          description: >-
            Ugyldig autentiseringstoken. For å kunne bruke tjenesten må klienten autentisere seg via Maskinporten og inkludere et gyldig token i Authorization-headeren. Tokenet må ha riktig *scope* for tjenesten, som er **nav/pensjon/v3/alderspensjon**.
        '403':
          description: >-
            Ikke tilgang til tjenesten (feil ved scope). For å kunne bruke tjenesten må klienten autentisere seg via Maskinporten og inkludere et gyldig token i Authorization-headeren. Tokenet må ha riktig *scope* for tjenesten, som er **nav/pensjon/v3/alderspensjon**.
        '500':
          description: >-
            (1) ImplementationUnrecoverableException (implementasjonsfeil i simulatoren) \
            
            (2) EgressException (feil ved kall fra simulatoren til andre tjenester) \
            
            (3) Exception (øvrige ikke-kategoriserte feil)
      security:
        - BearerAuthentication: []
  /pensjonssimulator/v2/simuler-alderspensjon-privat-afp:
    post:
      tags:
        - Alderspensjon og privat AFP
      summary: Simuler alderspensjon og privat AFP
      description: >-
        Lager en prognose for utbetaling av alderspensjon og privat avtalefestet
        pensjon (AFP).\

        Dette er en tjeneste for pensjonsportaler.\

        \

        **Simuleringstype** styres av feltet `simulerPrivatAfp`:\

        – `true`: beregner alderspensjon kombinert med privat AFP (`ALDER_M_AFP_PRIVAT`).\

        – `false` eller utelatt: beregner kun alderspensjon (`ALDER`).\

        \

        Dersom simuleringen ikke kan gjennomføres fullt ut (f.eks. utilstrekkelig opptjening),
        returneres HTTP 200 med `suksess: false` og utfylt `problem`-felt.\

        \

        *Scope*: **nav:pensjon/simulering/alderspensjonogprivatafp**
      operationId: simulerAlderspensjonOgPrivatAfpV2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlderspensjonOgPrivatAfpSpecV2'
            examples:
              gradertOgHeltUttak:
                summary: Gradert uttak fra 62, heltuttak fra 67, gift, simuler AFP
                value:
                  personident: "01026512345"
                  sivilstatusVedPensjonering: GIFT
                  foersteUttak:
                    fomDato: "2027-03-01"
                    grad: 50
                    aarligInntekt: 400000
                  heltUttak:
                    fomDato: "2032-03-01"
                    grad: 100
                    aarligInntekt: 0
                  aarligInntektFoerUttak: 600000
                  antallInntektsaarEtterHeltUttak: 0
                  aarIUtlandetEtter16: 0
                  harEpsPensjon: false
                  harEpsPensjonsgivendeInntektOver2G: true
                  simulerPrivatAfp: true
        required: true
      responses:
        '200':
          description: >-
            Simulering av alderspensjon og privat AFP utført.\

            Merk: `suksess` kan være `false` ved HTTP 200 dersom simuleringen ikke
            kunne gjennomføres (f.eks. `UTILSTREKKELIG_OPPTJENING`). Se `problem`-feltet.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AlderspensjonOgPrivatAfpResultV2'
              examples:
                suksess:
                  summary: Vellykket simulering med gradert og helt uttak
                  value:
                    suksess: true
                    alderspensjonsperioder:
                      - alder: 62
                        beloep: 180000
                        datoFom: "2027-03-01"
                        uttaksperiode:
                          - startmaaned: 3
                            uttaksgrad: 50
                      - alder: 67
                        beloep: 320000
                        datoFom: "2032-03-01"
                        uttaksperiode:
                          - startmaaned: 3
                            uttaksgrad: 100
                    privatAfpPerioder:
                      - alder: 62
                        beloep: 42000
                      - alder: 67
                        beloep: 42000
                    harNaavaerendeUttak: false
                    harTidligereUttak: false
                    harLoependePrivatAfp: false
                    problem: null
        '400':
          description: >-
            Simulering kunne ikke utføres pga. uakseptable inndata. Feilkode i `problem.kode`:\

            – `UGYLDIG_UTTAKSDATO`: `foersteUttak.fomDato` er i fortiden, eller etter `heltUttak.fomDato`.\

            – `UGYLDIG_UTTAKSGRAD`: `grad` er ikke en av de gyldige verdiene (20, 40, 50, 60, 80, 100).\

            – `UGYLDIG_SIVILSTATUS`: `sivilstatusVedPensjonering` er ikke en gyldig kode.\

            – `UGYLDIG_INNTEKT`: negativ inntekt, eller inntektsdato ikke 1. i måneden.\

            – `UGYLDIG_ANTALL_AAR`: `antallInntektsaarEtterHeltUttak` er negativ.\

            – `UGYLDIG_PERSONIDENT`: `personident` er ikke et gyldig fødselsnummer/D-nummer.\

            – `PERSON_FOR_HOEY_ALDER`: personen er for gammel for simulering.\

            – `ANNEN_KLIENTFEIL`: annen klientfeil.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AlderspensjonOgPrivatAfpResultV2'
              examples:
                feil:
                  summary: Mislykket simulering pga. ugyldige inndata
                  value:
                    suksess: false
                    alderspensjonsperioder: []
                    privatAfpPerioder: []
                    harNaavaerendeUttak: false
                    harTidligereUttak: false
                    harLoependePrivatAfp: false
                    problem:
                      kode: UGYLDIG_UTTAKSGRAD
                      beskrivelse: "Ugyldig uttaksgrad: 30"
        '401':
          description: >-
            Ugyldig autentiseringstoken. Klienten må autentisere seg via Maskinporten
            med scope **nav:pensjon/simulering/alderspensjonogprivatafp**.
        '403':
          description: >-
            Ikke tilgang (feil scope). Klienten må autentisere seg via Maskinporten
            med scope **nav:pensjon/simulering/alderspensjonogprivatafp**.
        '404':
          description: >-
            `PERSON_IKKE_FUNNET`: personen med oppgitt `personident` ble ikke funnet.
        '500':
          description: >-
            `SERVERFEIL`: intern feil i simulatoren. Se `problem.beskrivelse` for detaljer.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AlderspensjonOgPrivatAfpResultV2'
              examples:
                feil:
                  summary: Intern serverfeil
                  value:
                    suksess: false
                    alderspensjonsperioder: []
                    privatAfpPerioder: []
                    harNaavaerendeUttak: false
                    harTidligereUttak: false
                    harLoependePrivatAfp: false
                    problem:
                      kode: SERVERFEIL
                      beskrivelse: "En uventet feil oppstod i simulatoren."
      security:
        - BearerAuthentication: []
  /pensjonssimulator/v1/tidligst-mulig-uttak:
    post:
      tags:
        - Uttak
      summary: Tidligst mulig uttak
      description: |-
        Finner den tidligst mulige dato for uttak av alderspensjon.\
        Dette er en tjeneste for offentlige tjenestepensjonsordninger.\
        Personen må være medlem av tjenestepensjonsordningen.\
        \
        *Scope*:\
        – Uten delegering: **nav:pensjonssimulator:simulering**\
        – Med delegering: **nav:pensjon/simulering.read**
      operationId: tidligstMuligUttak
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TidligstMuligUttakSpecV1'
        required: true
      responses:
        '200':
          description: Utledning av uttaksdato utført
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/TidligstMuligUttakResultV1'
      security:
        - BearerAuthentication: []
  /pensjonssimulator/v1/simuler-folketrygdbeholdning:
    post:
      tags:
        - Beholdning
      summary: Simuler folketrygdbeholdning
      description: |-
        Lager en prognose for pensjonsbeholdning i folketrygden.\
        Dette er en tjeneste for offentlige tjenestepensjonsordninger.\
        Personen må være medlem av tjenestepensjonsordningen.\
        \
        *Scope*:\
        – Uten delegering: **nav:pensjonssimulator:simulering**\
        – Med delegering: **nav:pensjon/simulering.read**
      operationId: simulerFolketrygdbeholdning
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FolketrygdBeholdningSpecV1'
        required: true
      responses:
        '200':
          description: Simulering av folketrygdbeholdning utført
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/FolketrygdBeholdningResultV1'
      security:
        - BearerAuthentication: []
  /pensjonssimulator/v0/simuler-afp-etterfulgt-av-alderspensjon:
    post:
      tags:
        - Offentlig AFP etterfulgt av alderspensjon
      summary: Simuler AFP etterfulgt av alderspensjon
      description: >-
        Lager en prognose for utbetaling av avtalefestet pensjon (AFP) i
        offentlig sektor, etterfulgt av alderspensjon.\
        
        Dette er en tjeneste for offentlige tjenestepensjonsordninger.\
        
        Personen må være medlem av tjenestepensjonsordningen.\

        \

        *Scope*:\

        – Uten delegering: **nav:pensjonssimulator:simulering**\

        – Med delegering: **nav:pensjon/simulering.read**
      operationId: simulerAfpEtterfulgtAvAlderspensjonV0
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AfpEtterfulgtAvAlderspensjonSpecV0'
        required: true
      responses:
        '200':
          description: Simulering av AFP etterfulgt av alderspensjon utført.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AfpEtterfulgtAvAlderspensjonResultV0'
        '400':
          description: Simulering kunne ikke utføres pga. uakseptabel input.
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/AfpEtterfulgtAvAlderspensjonResultV0'
      security:
        - BearerAuthentication: []
  /pensjonssimulator/v1/status:
    get:
      tags:
        - Tjenestestatus
      summary: Status for tjenestene
      description: >-
        Sjekker om tjenestene er oppe og kjører.\

        Krever intet *scope*.
      operationId: status
      responses:
        '200':
          description: OK
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/StatusV1'
components:
  schemas:
    AlderspensjonSpecV4:
      type: object
      properties:
        personId:
          description: >-
            Fødselsnummer (11 siffer) eller D-nummer for personen som skal
            simuleres.
          type: string
        gradertUttak:
          description: >-
            Spesifikasjon for gradert (delvis) uttak av alderspensjon. Utelates
            dersom det kun simuleres helt uttak. Uttaksgraden påvirker størrelsen
            på pensjonsutbetalingen frem til helt uttak.
          $ref: '#/components/schemas/GradertUttakSpecV4'
        heltUttakFraOgMedDato:
          description: >-
            Dato for oppstart av helt (100 %) uttak av alderspensjon, i formatet
            "YYYY-MM-DD". Må være første dag i en måned. Dersom gradert uttak
            er oppgitt, må denne datoen være etter datoen for gradert uttak.
          type: string
        aarIUtlandetEtter16:
          description: >-
            Antall år personen har bodd utenfor Norge etter fylte 16 år. Brukes
            til beregning av trygdetid, som påvirker størrelsen på
            garantipensjonen. Standardverdi er 0.
          type: integer
          format: int32
        epsPensjon:
          description: >-
            Angir om ektefelle, partner eller samboer (EPS) har pensjon.
            Påvirker størrelsen på garantipensjonen – satsen reduseres dersom
            EPS har pensjon.
          type: boolean
        eps2G:
          description: >-
            Angir om ektefelle, partner eller samboer (EPS) har inntekt over
            2 ganger grunnbeløpet (2G). Påvirker størrelsen på
            garantipensjonen – satsen reduseres dersom EPS har inntekt over 2G.
          type: boolean
        fremtidigInntektListe:
          description: >-
            Liste over fremtidige inntekter for personen. Inntektene påvirker
            pensjonsopptjeningen frem til uttaksdato og dermed størrelsen på
            alderspensjonen. Alle datoer må være den 1. i måneden, og det kan
            ikke være duplikate startdatoer eller negative beløp.
          type: array
          items:
            $ref: '#/components/schemas/PensjonInntektSpecV4'
        rettTilAfpOffentligDato:
          description: |
            Dato for når personen får rett til offentlig AFP, i formatet "YYYY-MM-DD". Brukes for å avgjøre om personen har rett til offentlig AFP, og for å beregne tidligste mulige uttaksdato for alderspensjon.
          type: string
    GradertUttakSpecV4:
      type: object
      properties:
        fraOgMedDato:
          description: >-
            Dato for oppstart av gradert uttak, i formatet "YYYY-MM-DD".
            Må være første dag i en måned.
          type: string
        uttaksgrad:
          description: >-
            Uttaksgrad i prosent for gradert uttak.
            Gyldige verdier: 20, 40, 50, 60, 80.
          type: integer
          format: int32
          enum: [20, 40, 50, 60, 80]
    PensjonInntektSpecV4:
      type: object
      properties:
        aarligInntekt:
          description: >-
            Årlig pensjonsgivende inntekt i kroner. Ikke-negativ verdi.
            Sett til 0 fra uttaksdato for å angi ingen inntekt etter uttak.
          type: integer
          format: int32
        fraOgMedDato:
          description: >-
            Dato inntekten gjelder fra og med, i formatet "YYYY-MM-DD".
            Må være første dag i en måned.
          type: string
    AlderspensjonFraFolketrygdenV4:
      type: object
      properties:
        fraOgMedDato:
          description: >-
            Første dato for perioden med alderspensjon, i formatet "YYYY-MM-DD".
          type: string
          format: date
        delytelseListe:
          description: >-
            Liste over delytelser (pensjonskomponenter) som inngår i perioden.
          type: array
          items:
            $ref: '#/components/schemas/PensjonDelytelseV4'
        uttaksgrad:
          description: >-
            Uttaksgrad i prosent for perioden.
          type: integer
          format: int32
      required:
        - delytelseListe
        - fraOgMedDato
        - uttaksgrad
    AlderspensjonResultV4:
      type: object
      properties:
        simuleringSuksess:
          description: >-
            Angir om simuleringen var vellykket. `false` dersom personen ikke
            hadde tilstrekkelig opptjening eller trygdetid, eller det oppstod
            en kjent feil i simuleringen.
          type: boolean
        aarsakListeIkkeSuksess:
          description: >-
            Liste over årsaker til at simuleringen ikke var vellykket.
            Tom liste dersom `simuleringSuksess` er `true`.
          type: array
          items:
            $ref: '#/components/schemas/PensjonSimuleringStatusV4'
        alderspensjon:
          description: >-
            Liste over simulerte alderspensjonsperioder fra folketrygden.
            Tom liste dersom `simuleringSuksess` er `false`.
          type: array
          items:
            $ref: '#/components/schemas/AlderspensjonFraFolketrygdenV4'
        forslagVedForLavOpptjening:
          description: >-
            Forslag til tidligste mulige uttaksdato dersom personen ikke har
            tilstrekkelig opptjening for det oppgitte uttakstidspunktet.
            Kun satt dersom `statusKode` er `AVSLAG_FOR_LAV_OPPTJENING`.
          $ref: '#/components/schemas/ForslagVedForLavOpptjeningV4'
        harUttak:
          description: >-
            Angir om personen allerede har løpende alderspensjon fra Nav
            på simuleringstidspunktet.
          type: boolean
      required:
        - aarsakListeIkkeSuksess
        - alderspensjon
        - harUttak
        - simuleringSuksess
    ForslagVedForLavOpptjeningV4:
      type: object
      properties:
        gradertUttak:
          description: >-
            Forslag til gradert uttak. `null` dersom kun helt uttak foreslås.
          $ref: '#/components/schemas/GradertUttakV4'
        heltUttakFraOgMedDato:
          description: >-
            Forslag til tidligste dato for helt uttak, i formatet "YYYY-MM-DD".
          type: string
          format: date
      required:
        - heltUttakFraOgMedDato
    GradertUttakV4:
      type: object
      properties:
        fraOgMedDato:
          description: >-
            Forslag til dato for gradert uttak, i formatet "YYYY-MM-DD".
          type: string
          format: date
        uttaksgrad:
          description: >-
            Forslag til uttaksgrad i prosent.
          type: integer
          format: int32
      required:
        - fraOgMedDato
        - uttaksgrad
    PensjonDelytelseV4:
      type: object
      properties:
        pensjonsType:
          description: >-
            Type pensjonskomponent. `inntektsPensjon` er inntektsbasert pensjon
            basert på pensjonsopptjening. `garantiPensjon` er garantipensjon
            som sikrer et minstenivå for alderspensjonen uavhengig av
            opptjening.
          type: string
          enum:
            - inntektsPensjon
            - garantiPensjon
        belop:
          description: >-
            Årlig beløp for delytelsen i kroner.
          type: integer
          format: int32
      required:
        - belop
        - pensjonsType
    PensjonSimuleringStatusV4:
      type: object
      properties:
        statusKode:
          description: >-
            Statuskode som angir årsak til at simuleringen ikke var vellykket.

            - `AVSLAG_FOR_LAV_OPPTJENING`: Utilstrekkelig pensjonsopptjening
              for valgt uttakstidspunkt. Se `forslagVedForLavOpptjening` for
              tidligste mulige alternativ.

            - `AVSLAG_FOR_KORT_TRYGDETID`: Utilstrekkelig trygdetid for valgt
              uttakstidspunkt.

            - `BRUKER_FODT_FOR_1943`: Personen er født før 1943 og støttes
              ikke av dette API-et.

            - `BRUKER_HAR_IKKE_LOPENDE_ALDERSPENSJON`: Endring av løpende
              uttak ble forsøkt, men personen har ikke løpende alderspensjon.

            - `BRUKER_HAR_LOPENDE_ALDERSPPENSJON_PAA_GAMMELT_REGELVERK`:
              Personen har alderspensjon på gammelt regelverk (pre-2011)
              som ikke støttes av dette API-et.

            - `UGYLDIG_ENDRING_AV_UTTAKSGRAD`: Ugyldig endring av uttaksgrad
              for person med løpende alderspensjon.

            - `ANNET`: Annen uklassifisert feil.
          type: string
          enum:
            - AVSLAG_FOR_LAV_OPPTJENING
            - AVSLAG_FOR_KORT_TRYGDETID
            - BRUKER_FODT_FOR_1943
            - BRUKER_HAR_IKKE_LOPENDE_ALDERSPENSJON
            - BRUKER_HAR_LOPENDE_ALDERSPPENSJON_PAA_GAMMELT_REGELVERK
            - UGYLDIG_ENDRING_AV_UTTAKSGRAD
            - ANNET
        statusBeskrivelse:
          description: >-
            Tekstlig beskrivelse av status, typisk navn på Java-unntaket som
            utløste feilen.
          type: string
      required:
        - statusBeskrivelse
        - statusKode
    AlderspensjonSpecV3:
      type: object
      properties:
        fnr:
          type: string
        sivilstandVedPensjonering:
