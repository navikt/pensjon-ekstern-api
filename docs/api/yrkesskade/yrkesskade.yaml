openapi: 3.0.1
info:
  title: Pensjon Yrkesskade
  description: Tjeneste for å hente informasjon om gjeldende vedtak for gammel yrkesskade.
  version: 1.0.0
servers:
  - url: https://pensjon-gw.ekstern.dev.nav.no/pensjon
  - url: https://pensjon-gw.nav.no/pensjon (ikke implementert enda)
paths:
  /yrkesskade:
    post:
      description: >-
        Henter gjeldende vedtak for gammel yrkesskade for en gitt person.
        Returnerer en liste med vedtak inkludert beregningsdetaljer for yrkesskade.
        Scope mot Maskinporten settes til `nav:pensjon/vedtaksinformasjon.read`.
      operationId: hentYrkesskadeInformasjon
      parameters:
        - in: header
          name: x-request-id
          description: UUID for å spore kallet
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HentYrkesskadeInformasjonRequest'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HentYrkesskadeInformasjonResponse'
        400:
          description: Feil i request-data fra klient (f.eks. ugyldig fødselsnummer)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        401:
          description: Autentisering feilet
        403:
          description: Autorisering til ressurs feilet, f.eks. feil scope i token
        500:
          description: Intern feil i tjenesten
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  schemas:
    HentYrkesskadeInformasjonRequest:
      title: Hent yrkesskade informasjon - request
      type: object
      required:
        - personId
      properties:
        personId:
          type: string
          description: Fødselsnummer, 11 siffer
          example: "01234567890"
        fomDato:
          type: string
          format: date
          description: Valgfri fra-og-med-dato for å begrense søket
          example: "2024-01-01"

    HentYrkesskadeInformasjonResponse:
      title: Hent yrkesskade informasjon - response
      type: object
      properties:
        pensjonVedtakListe:
          type: array
          items:
            $ref: '#/components/schemas/YrkesskadeInformasjonDto'

    YrkesskadeInformasjonDto:
      title: Yrkesskade vedtak
      type: object
      properties:
        vedtakId:
          type: integer
          format: int64
          description: Unik identifikator for vedtaket
        virkningFom:
          type: string
          format: date
          description: Vedtakets virkningstidspunkt fra og med
        virkningTom:
          type: string
          format: date
          nullable: true
          description: Vedtakets virkningstidspunkt til og med
        vedtaksKode:
          $ref: '#/components/schemas/VedtakTypeDto'
        typeYrkesskade:
          $ref: '#/components/schemas/YrkesskadeTypeDto'
        beregningListe:
          type: array
          items:
            $ref: '#/components/schemas/BeregningDto'

    VedtakTypeDto:
      type: string
      nullable: true
      description: Type vedtak
      enum:
        - AVSL
        - ENDRING
        - FORGANG
        - GOMR
        - OPPHOR
        - OPPTJ
        - REGULERING
        - SAMMENSTOT

    YrkesskadeTypeDto:
      type: string
      nullable: true
      description: Type yrkesskade
      enum:
        - BP
        - EP
        - UP

    BeregningDto:
      title: Beregning
      type: object
      properties:
        virkningFom:
          type: string
          format: date
          nullable: true
          description: Beregningens virkningstidspunkt fra og med
        virkningTom:
          type: string
          format: date
          nullable: true
          description: Beregningens virkningstidspunkt til og med
        krigOgGammelYrkesskade:
          $ref: '#/components/schemas/YrkesskadeBeregningDto'

    YrkesskadeBeregningDto:
      title: Yrkesskade beregning
      type: object
      nullable: true
      properties:
        belop:
          type: integer
          nullable: true
          description: Beløp til utbetaling
        pensjongrad:
          type: integer
          nullable: true
          description: Pensjonsgrad i prosent
        forholdstallYG:
          type: number
          format: double
          nullable: true
          description: Forholdstall for yrkesskadegrad

    ProblemDetail:
      title: Feildetaljer (RFC 9457)
      type: object
      properties:
        type:
          type: string
          description: URI som identifiserer problemtypen
          example: "yrkesskade:ugyldig-input"
        title:
          type: string
          example: "yrkesskade"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "Ugyldig input til tjenesten"
        correlationId:
          type: string
          description: Korrelasjons-ID for feilsøking

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    security:
      - bearerAuth: []
