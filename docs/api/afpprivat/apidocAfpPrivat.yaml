openapi: 3.0.1
info:
  title: Pensjon AFP-privat
  description: Inneholder tjenester for å behandle og hente informasjon om en AFP-privat saker/brukere.
  version: 1.0.0
servers:
  - url: https://pensjon-gw.ekstern.dev.nav.no/pensjon/afp-privat/
  - url: https://pensjon-gw.nav.no/pensjon/afp-privat/
paths:
  /mottarAfpPrivat:
    post:
      description: Hent ut informasjon om bruker mottar AFP-privat fra og med gitt tidspunkt. Scope mot Maskinporten settes til `nav:pensjon/afpprivat/mottarafpprivat`.
      operationId: mottarafpprivat
      parameters:
        - in: header
          name: x-request-id
          description: UUID for å spore kallet
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MottarAfpPrivatRequest'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MottarAfpPrivatResponse'
        400:
          description: Feil i request-data fra klient
        401:
          description: Autentisering feilet
        403:
          description: Autorisering til ressurs feilet, feks feil scope i token
  /mottar-eller-har-mottatt-afpprivat:
    post:
      description: Hent ut informasjon om bruker mottar eller har mottatt AFP-privat. Scope mot Maskinporten settes til `nav:pensjon/afpprivat/mottarafpprivat`.
      operationId: mottarellerharmottattafpprivat
      parameters:
        - in: header
          name: x-request-id
          description: UUID for å spore kallet
          schema:
            type: string
            format: uuid
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MottarEllerHarMottattAfpPrivatRequest'
        required: true
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MottarEllerHarMottattAfpPrivatResponse'
        400:
          description: Feil i request-data fra klient, f.eks. ugyldig eller ukjent fødselsnummer
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        401:
          description: Autentisering feilet
        403:
          description: Autorisering til ressurs feilet, feks feil scope i token
        500:
          description: Intern feil under behandling av forespørselen
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  schemas:
    MottarAfpPrivatRequest:
      title: Mottar AFP Privat - request
      type: object
      properties:
        personId:
          type: string
          description: Fødselsnummer, 11 siffer
          example: "01234567890"
        fraOgMedDato:
          type: string
          format: YYYY-mm-DD
          description: Ønsket virkningstidspunkt å sjekke på om bruker mottar afp-privat          
          example: "2024-01-01"          
    MottarAfpPrivatResponse:
      title: Mottar AFP Privat - response
      type: object
      properties:
        mottarAfpPrivat:
          type: boolean
    MottarEllerHarMottattAfpPrivatRequest:
      title: Mottar eller har mottatt AFP Privat - request
      type: object
      properties:
        personId:
          type: string
          description: Fødselsnummer, 11 siffer
          example: "01234567890"
    MottarEllerHarMottattAfpPrivatResponse:
      title: Mottar eller har mottatt AFP Privat - response
      type: object
      properties:
        mottarEllerHarMottattAfpPrivat:
          type: boolean
    ProblemDetail:
      title: Problem Detail (RFC 9457)
      type: object
      properties:
        type:
          type: string
          description: URI som identifiserer problemtypen
          example: "mottar-eller-har-mottatt-afpprivat:person-ikke-funnet"
        title:
          type: string
          description: Kort beskrivelse av problemet
          example: "mottar-eller-har-mottatt-afpprivat"
        status:
          type: integer
          description: HTTP-statuskode
          example: 400
        detail:
          type: string
          description: Detaljert beskrivelse av feilen
          example: "Fant ikke person med gitt fnr"
        correlationId:
          type: string
          description: Korrelasjons-ID for sporing
          example: "123e4567-e89b-12d3-a456-426614174000"
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    security:
      - bearerAuth: [ ]
